name: CivicGuard CSMS — CI Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-test:
    name: Lint, Test & Coverage
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npx eslint "src/**/*.{ts,tsx}" --max-warnings=0

      - name: Run Jest unit & integration tests with coverage
        run: npm test -- --coverage --coverageThreshold='{"global":{"lines":80}}'
        env:
          CI: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/

  docker-build:
    name: Docker Build Verification
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t civicguard-kigali:ci .

      - name: Smoke test — container starts
        run: |
          docker run -d --name civicguard-test -p 3000:80 civicguard-kigali:ci
          sleep 5
          curl --fail http://localhost:3000 || exit 1
          docker stop civicguard-test
